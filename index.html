<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Relatório Zona Verde CE</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

<header class="header">

<img src="unnamed.jpg" alt="Embaixada de Cristo" class="logo">

<h1>RELATÓRIO OFICIAL</h1>
<h2>ZONA VERDE CE</h2>

<p>Igreja Embaixada de Cristo Moçambique</p>

<div class="progress">
<div id="progressBar"></div>
</div>

</header>

<form id="relatorioForm">

<section class="card">

<h3><i class="fas fa-users"></i> Dados Gerais</h3>

<input type="text" id="mes" placeholder="Mês" required>

<input type="text" id="celula" placeholder="Célula" required>

<input type="text" id="lider" placeholder="Líder" required>

<input type="date" id="data" required>

</section>

<section class="card">

<h3><i class="fas fa-chart-bar"></i> Relatório da Célula</h3>

<input type="number" id="presenca" placeholder="Presença">

<input type="number" id="ft" placeholder="FT">

<input type="number" id="nc" placeholder="NC">

<input type="number" id="oferta" placeholder="Oferta">

</section>

<section class="card">

    <h3>
        <i class="fas fa-fire"></i>
        Programa FEVO
    </h3>

    <div class="fevo-grid">

        <label class="check-card">
            <input type="checkbox" id="presencaFevo">
            <span>✅ Presença</span>
        </label>

        <label class="check-card">
            <input type="checkbox" id="visitou">
            <span>🏠 Visitou</span>
        </label>

        <label class="check-card">
            <input type="checkbox" id="evangelizou">
            <span>📖 Evangelizou</span>
        </label>

        <label class="check-card">
            <input type="checkbox" id="followup">
            <span>🤝 Follow Up</span>
        </label>

    </div>

    <div class="input-group">
        <label>✨ Quantas Almas Foram Ganhas?</label>
        <input
            type="number"
            id="almas"
            placeholder="Digite a quantidade">
    </div>

</section>

<button type="submit" class="btn">
<i class="fab fa-whatsapp"></i>
Enviar para WhatsApp
</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
